openapi: 3.1.0
info:
  title: Interview Knowledge Bridge API
  version: 0.2.2
  description: API for retrieving whitelisted learning portfolio and project documents.

servers:
  - url: https://7cs1elwoy0.execute-api.ap-northeast-1.amazonaws.com

paths:
  /health:
    get:
      operationId: getHealth
      summary: Check API health
      responses:
        "200":
          description: API is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /documents:
    get:
      operationId: listDocuments
      summary: List available documents
      description: Returns a list of private and public documents that are allowed to be retrieved.
      security:
        - BearerAuth: []
      responses:
        "200":
          description: List of available documents
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentListResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /documents/{document_id}:
    get:
      operationId: getDocumentById
      summary: Get a whitelisted document
      description: Returns a document only when the document_id is allowed by the API.
      security:
        - BearerAuth: []
      parameters:
        - name: document_id
          in: path
          required: true
          description: The whitelisted document ID.
          schema:
            type: string
            enum:
              - linux-replace
              - incident-response
              - dev-marathon
              - physical-network
              - private-interview-knowledge-bridge
              - public-portfolio-index
              - public-interview-knowledge-bridge
              - public-odaibox
              - public-stt-ecs
              - public-alexa-skill
      responses:
        "200":
          description: Document detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentDetailResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Document not found or not allowed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer

  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok

    DocumentListResponse:
      type: object
      properties:
        documents:
          type: array
          items:
            $ref: "#/components/schemas/DocumentItem"

    DocumentItem:
      type: object
      properties:
        id:
          type: string
          example: public-portfolio-index
        title:
          type: string
          example: Portfolio index
        source:
          type: string
          enum:
            - private
            - public
          example: public

    DocumentDetailResponse:
      type: object
      properties:
        id:
          type: string
          example: public-portfolio-index
        title:
          type: string
          example: Portfolio index
        source:
          type: string
          enum:
            - private
            - public
          example: public
        source_path:
          type: string
          example: gpt-context/summaries/portfolio-index.md
        content:
          type: string
          description: Markdown content retrieved from the repository.

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: unauthorized
        message:
          type: string
          example: Unauthorized
